# Lovelace examples for OpenLigaDB Team Tracker
#
# How to use:
# 1. Open a Home Assistant dashboard
# 2. Edit dashboard -> Add card -> Manual
# 3. Paste one example below
# 4. Replace the sample entity ids with your own team entities
#
# Sample entity prefix used in this file:
#   sensor.1_fc_saarbrucken_*
#
# You can find your actual entity ids in:
#   Developer Tools -> States
#
# NOTE ON JINJA LOOPS IN MARKDOWN TABLES:
# `{% for x in list %}\n| ... |\n{% endfor %}` looks fine but actually emits
# a blank line between every row (the newline after `%}` plus the newline
# before the next iteration's row). A blank line inside a pipe table breaks
# table detection, so it silently falls back to raw text with visible "|"
# characters. Fix: use `{% for x in list -%}` (note the trailing dash) to
# strip that whitespace, so rows are joined directly by a single newline.

###############################################################################
# 1) Compact team overview
###############################################################################

---
type: vertical-stack
cards:
  - type: entities
    title: 1. FC Saarbrücken
    show_header_toggle: false
    entities:
      - entity: sensor.1_fc_saarbrucken_tabellenplatz
        name: Tabellenplatz
      - entity: sensor.1_fc_saarbrucken_punkte
        name: Punkte
      - entity: sensor.1_fc_saarbrucken_nachstes_spiel
        name: Nächstes Spiel
      - entity: sensor.1_fc_saarbrucken_letztes_spiel
        name: Letztes Spiel
  - type: markdown
    content: |
      {% set pos = states('sensor.1_fc_saarbrucken_tabellenplatz') %}
      {% set pts = states('sensor.1_fc_saarbrucken_punkte') %}
      {% set played = state_attr('sensor.1_fc_saarbrucken_tabellenplatz', 'matches') %}
      {% set won = state_attr('sensor.1_fc_saarbrucken_tabellenplatz', 'won') %}
      {% set draw = state_attr('sensor.1_fc_saarbrucken_tabellenplatz', 'draw') %}
      {% set lost = state_attr('sensor.1_fc_saarbrucken_tabellenplatz', 'lost') %}
      {% set gd = state_attr('sensor.1_fc_saarbrucken_tabellenplatz', 'goal_diff') %}
      **Platz {{ pos }}** mit **{{ pts }} Punkten**

      Bilanz: {{ won }}S / {{ draw }}U / {{ lost }}N
      Spiele: {{ played }} | Tordifferenz: {{ gd }}

###############################################################################
# 2) Team logo / badge
###############################################################################

---
type: picture-entity
entity: sensor.1_fc_saarbrucken_tabellenplatz
name: 1. FC Saarbrücken
show_state: false
show_name: true

###############################################################################
# 3) Next match card
###############################################################################

---
type: markdown
title: Nächstes Spiel
content: |
  {% set entity = 'sensor.1_fc_saarbrucken_nachstes_spiel' %}
  {% set kickoff = state_attr(entity, 'date_local') %}
  {% set matchday = state_attr(entity, 'matchday') %}
  {% set league = state_attr(entity, 'league') %}
  {% set location = state_attr(entity, 'location') %}
  ## {{ states(entity) }}

  **Wettbewerb:** {{ league or '-' }}
  **Spieltag/Runde:** {{ matchday or '-' }}
  **Anstoß:** {{ as_timestamp(kickoff) | timestamp_custom('%d.%m.%Y %H:%M', true) if kickoff else '-' }}
  **Ort:** {{ location or '-' }}

###############################################################################
# 4) Last match card
###############################################################################

---
type: markdown
title: Letztes Spiel
content: |
  {% set entity = 'sensor.1_fc_saarbrucken_letztes_spiel' %}
  {% set kickoff = state_attr(entity, 'date_local') %}
  {% set matchday = state_attr(entity, 'matchday') %}
  {% set league = state_attr(entity, 'league') %}
  ## {{ states(entity) }}

  **Wettbewerb:** {{ league or '-' }}
  **Spieltag/Runde:** {{ matchday or '-' }}
  **Datum:** {{ as_timestamp(kickoff) | timestamp_custom('%d.%m.%Y %H:%M', true) if kickoff else '-' }}

###############################################################################
# 5) Match schedule list
###############################################################################

---
type: markdown
title: Spielplan
content: |
  | Datum | Spiel | Wettbewerb |
  |---|---|---|
  {% for match in state_attr('sensor.1_fc_saarbrucken_spiele', 'matches') or [] -%}
  | {{ as_timestamp(match.date_local) | timestamp_custom('%d.%m. %H:%M', true) if match.date_local else '-' }} | {% if match.finished %}{{ match.home }} {{ match.score or '' }} {{ match.away }}{% else %}{{ match.home }} - {{ match.away }}{% endif %} | {{ match.matchday or match.league or '-' }} |
  {% endfor %}

###############################################################################
# 6) League table (with team crests)
###############################################################################

---
type: markdown
title: Tabelle
content: |
  {% set entity = 'sensor.1_fc_saarbrucken_tabelle' %}
  ## Saison {{ state_attr(entity, 'season') }}/{{ (state_attr(entity, 'season') or 0) + 1 }}
  | # | | Team | Sp | TD | Pkt |
  |---|---|---|---|---|---|
  {% for row in state_attr(entity, 'table') or [] -%}
  | {{ row.position }} | <img src="{{ row.icon }}" width="22" height="22"> | {% if 'Saarbrücken' in row.team %}**{{ row.team }}**{% else %}{{ row.team }}{% endif %} | {{ row.matches }} | {{ row.goal_diff }} | **{{ row.points }}** |
  {% endfor %}

###############################################################################
# 7) One-card glance style overview
#
# NOTE ON ICONS: every sensor in this integration exposes an "entity_picture"
# attribute pointing at your OWN team's crest (used for the header logo,
# picture-entity card, etc). The glance card prefers that picture over any
# icon, so without an explicit "icon:" override every row here would show
# the same team crest four times - including for "Nächstes"/"Letztes", which
# looks like the opponent's crest is missing rather than just not applicable.
# Set an explicit "icon:" per entity to get distinct, sensible glyphs instead.
###############################################################################

---
type: glance
title: FCS Kompakt
show_state: true
show_name: true
entities:
  - entity: sensor.1_fc_saarbrucken_tabellenplatz
    name: Platz
    icon: mdi:podium
  - entity: sensor.1_fc_saarbrucken_punkte
    name: Punkte
    icon: mdi:soccer
  - entity: sensor.1_fc_saarbrucken_nachstes_spiel
    name: Nächstes
    icon: mdi:calendar-arrow-right
  - entity: sensor.1_fc_saarbrucken_letztes_spiel
    name: Letztes
    icon: mdi:calendar-check

###############################################################################
# 8) Next match with both team crests
#
# Shows the home and away crest side by side for the next match. Falls back
# from the league "next match" sensor to the cup ("_2") sensor when the
# league sensor has no match in its data window (e.g. during summer break).
#
# IMPORTANT: The built-in HA markdown card strips the "style" attribute from
# HTML (via its sanitizer), so flexbox/CSS sizing on <div>/<img> is silently
# ignored and images render at full native size. Use the "width"/"height"
# HTML attributes directly instead - those are allowed through and control
# the rendered size correctly. A plain HTML <table> is a reliable way to get
# a side-by-side layout without relying on "style".
###############################################################################

---
type: markdown
title: Nächstes Spiel
content: |
  {% set league_state = states('sensor.1_fc_saarbrucken_nachstes_spiel') %}
  {% set cup_state = states('sensor.1_fc_saarbrucken_nachstes_spiel_2') %}
  {% if league_state not in ['unknown','unavailable','None'] %}
  {% set ns_entity = 'sensor.1_fc_saarbrucken_nachstes_spiel' %}
  {% elif cup_state not in ['unknown','unavailable','None'] %}
  {% set ns_entity = 'sensor.1_fc_saarbrucken_nachstes_spiel_2' %}
  {% else %}
  {% set ns_entity = none %}
  {% endif %}
  {% if ns_entity %}
  {% set home = state_attr(ns_entity, 'home') %}
  {% set away = state_attr(ns_entity, 'away') %}
  {% set home_icon = state_attr(ns_entity, 'home_icon') %}
  {% set away_icon = state_attr(ns_entity, 'away_icon') %}
  {% set league = state_attr(ns_entity, 'league') %}
  {% set matchday = state_attr(ns_entity, 'matchday') %}
  {% set kickoff = state_attr(ns_entity, 'date_local') %}
  <table width="100%"><tr><td align="center" width="40%"><img src="{{ home_icon }}" width="70" height="70"><br>{{ home }}</td><td align="center" width="20%"><b>vs</b></td><td align="center" width="40%"><img src="{{ away_icon }}" width="70" height="70"><br>{{ away }}</td></tr></table>

  **{{ league or '-' }}**{% if matchday %} · {{ matchday }}{% endif %}
  {% if kickoff %}
  Anstoß: **{{ as_timestamp(kickoff) | timestamp_custom('%d.%m.%Y %H:%M', true) }}**
  {% endif %}
  {% else %}
  Aktuell kein bevorstehendes Spiel im Datenfenster (Liga & Pokal).
  {% endif %}

###############################################################################
# 9) League/cup balance entities cards with distinct icons
#
# Same "entity_picture always shows your own crest" issue as example #7
# applies to "entities" cards too: without an explicit "icon:" per row,
# every attribute row (Siege, Niederlagen, Tordifferenz, ...) would show
# the same team crest. Set an "icon:" per row for something that actually
# reflects what the row means.
###############################################################################

---
type: entities
title: 3. Liga Bilanz
show_header_toggle: false
entities:
  - entity: sensor.1_fc_saarbrucken_tabellenplatz
    name: Tabellenplatz
    icon: mdi:podium
  - entity: sensor.1_fc_saarbrucken_punkte
    name: Punkte
    icon: mdi:soccer
  - type: attribute
    entity: sensor.1_fc_saarbrucken_tabellenplatz
    attribute: matches
    name: Spiele
    icon: mdi:calendar-multiple
  - type: attribute
    entity: sensor.1_fc_saarbrucken_tabellenplatz
    attribute: won
    name: Siege
    icon: mdi:trophy
  - type: attribute
    entity: sensor.1_fc_saarbrucken_tabellenplatz
    attribute: draw
    name: Unentschieden
    icon: mdi:equal
  - type: attribute
    entity: sensor.1_fc_saarbrucken_tabellenplatz
    attribute: lost
    name: Niederlagen
    icon: mdi:close-circle-outline
  - type: attribute
    entity: sensor.1_fc_saarbrucken_tabellenplatz
    attribute: goal_diff
    name: Tordifferenz
    icon: mdi:swap-vertical-bold

---
type: entities
title: FCS im DFB-Pokal
show_header_toggle: false
entities:
  - entity: sensor.1_fc_saarbrucken_nachstes_spiel_2
    name: Nächstes Pokalspiel
    icon: mdi:calendar-arrow-right
  - entity: sensor.1_fc_saarbrucken_letztes_spiel_2
    name: Letztes Pokalspiel
    icon: mdi:calendar-check
  - type: attribute
    entity: sensor.1_fc_saarbrucken_tabellenplatz_2
    attribute: matches
    name: Pokalspiele
    icon: mdi:calendar-multiple
  - type: attribute
    entity: sensor.1_fc_saarbrucken_tabellenplatz_2
    attribute: won
    name: Siege
    icon: mdi:trophy
  - type: attribute
    entity: sensor.1_fc_saarbrucken_tabellenplatz_2
    attribute: lost
    name: Niederlagen
    icon: mdi:close-circle-outline
  - type: attribute
    entity: sensor.1_fc_saarbrucken_tabellenplatz_2
    attribute: goals
    name: Tore
    icon: mdi:soccer
  - type: attribute
    entity: sensor.1_fc_saarbrucken_tabellenplatz_2
    attribute: opponent_goals
    name: Gegentore
    icon: mdi:shield-alert-outline
